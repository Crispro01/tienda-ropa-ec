<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ producto.nombre }} · TiendaRopaEC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>TiendaRopaEC 👕</h1>
    </header>

    <main>
        <a class="volver" href="{{ url_for('home') }}">← Volver a la tienda</a>
        <div class="detalle">
            <h2>{{ producto.nombre }}</h2>
            <p class="categoria">Categoría: {{ producto.categoria }}</p>
            <p class="precio">${{ "%.2f"|format(producto.precio) }}</p>
            <p class="stock">Disponibles: {{ producto.stock }} unidades</p>
        </div>
    </main>
</body>
</html>
