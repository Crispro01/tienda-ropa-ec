<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión · CSP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="topbar">
        <div class="topbar-inner">
            <span class="brand-mini">CSP</span>
            <div class="auth-links">
                <a href="{{ url_for('registro') }}">Registrarse</a>
            </div>
        </div>
    </div>

    <div class="auth-wrap">
        <div class="auth-card">
            <h2>Iniciar sesión</h2>
            <p class="auth-sub">Bienvenido de vuelta a CSP</p>

            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="field">
                    <label for="correo">Correo</label>
                    <input type="email" id="correo" name="correo" value="{{ correo or '' }}" required>
                </div>
                <div class="field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="auth-submit">Entrar</button>
            </form>

            <p class="auth-footer">¿No tienes cuenta? <a href="{{ url_for('registro') }}">Regístrate</a></p>
        </div>
    </div>
</body>
</html>
